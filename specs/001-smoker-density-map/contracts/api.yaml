openapi: 3.0.3
info:
  title: SmokeSpot API
  version: 0.1.0
  description: 菸槍熱點地圖後端 API。全程 HTTPS/TLS。回報支援匿名與會員(JWT)。
servers:
  - url: https://localhost:5001
paths:
  /api/reports:
    get:
      summary: 取得可視範圍內聚合後的菸味熱點
      parameters:
        - { name: minLat, in: query, required: true, schema: { type: number } }
        - { name: minLng, in: query, required: true, schema: { type: number } }
        - { name: maxLat, in: query, required: true, schema: { type: number } }
        - { name: maxLng, in: query, required: true, schema: { type: number } }
      responses:
        '200':
          description: 熱點清單（衰退加權後）
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Hotspot' }
    post:
      summary: 新增一筆菸味回報（匿名免帶 JWT 但須附 CAPTCHA token；會員帶 JWT 免 CAPTCHA）
      security:
        - {}
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateReport' }
      responses:
        '201': { description: 已建立 }
        '400': { description: 座標超出台灣範圍、CAPTCHA 失敗或驗證失敗 }
        '409': { description: 重複回報（去重/節流），未新增 }
        '429': { description: 已達單一來源每日回報上限（FR-015） }
  /api/members/me/reports:
    get:
      summary: 會員檢視自己提交的回報（FR-013）
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 該會員的回報清單
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/MyReport' }
        '401': { description: 未登入 }
  /api/reports/{id}:
    delete:
      summary: 會員刪除自己提交的回報（FR-013）
      security:
        - bearerAuth: []
      parameters:
        - { name: id, in: path, required: true, schema: { type: string, format: uuid } }
      responses:
        '204': { description: 已刪除 }
        '401': { description: 未登入 }
        '403': { description: 非該回報擁有者 }
        '404': { description: 找不到回報 }
  /api/reports/feedback:
    post:
      summary: 對某熱點提交反饋（已無菸味／不實）
      security:
        - {}
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateFeedback' }
      responses:
        '201': { description: 已記錄 }
        '400': { description: 驗證失敗 }
  /api/auth/register:
    post:
      summary: 會員註冊
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Credentials' }
      responses:
        '201': { description: 已註冊 }
        '400': { description: Email 已存在或密碼不符規則 }
  /api/auth/login:
    post:
      summary: 會員登入，回傳 JWT
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Credentials' }
      responses:
        '200':
          description: 登入成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        '401': { description: 帳密錯誤 }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CreateReport:
      type: object
      required: [latitude, longitude]
      properties:
        latitude: { type: number, example: 25.0478, description: 回報的菸味地點緯度 }
        longitude: { type: number, example: 121.5170, description: 回報的菸味地點經度 }
        reporterLat: { type: number, nullable: true, description: 回報者裝置定位緯度，供鄰近驗證(FR-014)，可省略 }
        reporterLng: { type: number, nullable: true, description: 回報者裝置定位經度，供鄰近驗證(FR-014)，可省略 }
        captchaToken: { type: string, nullable: true, description: 匿名回報必填的人機驗證 token；會員可省略(FR-016) }
    MyReport:
      type: object
      properties:
        id: { type: string, format: uuid }
        latitude: { type: number }
        longitude: { type: number }
        createdAt: { type: string, format: date-time }
        proximityVerified: { type: boolean }
    CreateFeedback:
      type: object
      required: [cellKey, type]
      properties:
        cellKey: { type: string }
        type: { type: string, enum: [NoLongerSmoky, Inaccurate] }
    Credentials:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, format: password }
    Hotspot:
      type: object
      properties:
        cellKey: { type: string }
        centerLat: { type: number }
        centerLng: { type: number }
        reportCount: { type: integer }
        densityWeight: { type: number }
        lastReportedAt: { type: string, format: date-time }
